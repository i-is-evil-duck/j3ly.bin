<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Share</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;max-width:600px;margin:50px auto;padding:20px;background:#0f0f0f;color:#fff}#d{border:3px dashed #333;padding:60px;text-align:center;border-radius:12px;cursor:pointer;transition:.2s}#d:hover,#d.drag{border-style:solid;background:#334}#f{display:none}select{background:#333;color:#fff;border:1px solid #444;padding:8px 12px;border-radius:6px;margin-bottom:15px;font-size:14px}.i{display:flex;justify-content:space-between;align-items:center;padding:12px;margin:8px 0;background:#1a1a1a;border-radius:8px;gap:10px}.n{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888}a{text-decoration:none;word-break:break-all;color:#fff}a:hover{text-decoration:underline}button{background:#333;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer}button:hover{background:#444}#p{height:2px;width:0;transition:.3s;position:fixed;top:0;left:0}</style></head><body><div id="p"></div><h1>TempShare</h1><p style="color:#666;margin:10px 0">Drop file -> get link -> auto-deletes</p><select id="t"><option value="30m">30m</option><option value="6h">6h</option><option value="48h" selected>48h</option><option value="2w">2w</option><option value="1m">1m</option><option value="3m">3m</option><option value="6m">6m</option><option value="1y">1y</option><option value="3y">3y</option></select><div id="d"><p>Drop file or click</p><input type="file" id="f"></div><div id="l"></div><script>const $=id=>document.getElementById(id),d=$('d'),f=$('f'),l=$('l'),p=$('p'),t=$('t');d.onclick=()=>f.click();d.ondragover=e=>{e.preventDefault();d.classList.add('drag')};d.ondragleave=()=>d.classList.remove('drag');d.ondrop=e=>{e.preventDefault();d.classList.remove('drag');h(e.dataTransfer.files[0])};f.onchange=e=>h(e.target.files[0]);async function h(f){if(!f)return;const x=new XMLHttpRequest();x.upload.onprogress=e=>p.style.width=(e.loaded/e.total*100)+'%';x.onload=()=>{p.style.width='0';const r=JSON.parse(x.responseText),div=document.createElement('div');div.className='i';div.innerHTML=`<a href="${r.url}" target="_blank">${location.origin}${r.url}</a><span class="n">${r.name}</span><button onclick="navigator.clipboard.writeText('${location.origin}${r.url}')">Copy</button>`;l.prepend(div)};x.open('POST','/upload');x.setRequestHeader('x-filename',f.name);x.setRequestHeader('x-ttl',t.value);x.send(f)}</script></body></html>
