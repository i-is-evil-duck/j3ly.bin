d="e"></p></div><div id="l"></div><div id="s"></div><script>(function(){const $=id=>document.getElementById(id),d=$('d'),f=document.createElement('input'),l=$('l'),p=$('p'),t=$('t'),e=$('e'),s=$('s');f.type='file';f.style.display='none';document.body.appendChild(f);function genId(){const c='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',r=new Uint8Array(8);crypto.getRandomValues(r);return Array.from(r,x=>c[x%c.length]).join('')}function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}async function uploadChunk(uploadId,chunkIdx,totalChunks,file,chunkSize,ttl,filename){const start=chunkIdx*chunkSize;const end=Math.min(start+chunkSize,file.size);const blob=file.slice(start,end);return new Promise((resolve,reject)=>{const x=new XMLHttpRequest();const startTime=Date.now();x.upload.onprogress=(ev)=>{if(ev.lengthComputable){const loaded=start+ev.loaded;const pct=(loaded/file.size)*100;p.style.width=pct+'%';s.textContent=`${fmtSize(loaded)}/${fmtSize(file.size)} (${Math.round(pct)}%)`}};x.onload=()=>{if(x.status===200){try{const r=JSON.parse(x.responseText);resolve(r)}catch(err){reject('Invalid response')}}else{reject(x.responseText||'HTTP '+x.status)}};x.onerror=()=>reject('Network error');x.onabort=()=>reject('Upload aborted');x.timeout=30000;x.ontimeout=()=>reject('Timeout');x.open('POST','/chunk');x.setRequestHeader('X-Upload-Id',uploadId);x.setRequestHeader('X-Chunk-Index',String(chunkIdx));x.setRequestHeader('X-Total-Chunks',String(totalChunks));x.setRequestHeader('X-Filename',encodeURIComponent(filename));x.setRequestHeader('X-Ttl',ttl);x.setRequestHeader('X-Total-Size',String(file.size));x.send(blob)});}async function handleFile(file){if(!file)return;e.textContent='';s.textContent='';p.style.width='0%';const maxSize=2*1024*1024*1024;if(file.size>maxSize){e.textContent='File too large (max 2GB)';return}const ttl=t.value;const uploadId=genId();const chunkSize=512*1024;const totalChunks=Math.max(1,Math.ceil(file.size/chunkSize));d.style.pointerEvents='none';d.style.opacity='0.6';try{for(let i=0;i<totalChunks;i++){await uploadChunk(uploadId,i,totalChunks,file,chunkSize,ttl,file.name);}p.style.width='100%';const div=document.createElement('div');div.className='i';const url=location.origin+'/s/'+uploadId;div.innerHTML=`<a href="${url}" target="_blank">${url}</a><button onclick="navigator.clipboard.writeText('${url}')">Copy</button>`;l.prepend(div);s.textContent='Done!';setTimeout(()=>{p.style.width='0';s.textContent=''},2000)}catch(err){e.textContent='Error: '+err;s.textContent='';p.style.width='0'}finally{d.style.pointerEvents='';d.style.opacity=''}}d.addEventListener('click',()=>f.click());d.addEventListener('touchstart',(ev)=>{ev.preventDefault();f.click()},{passive:false});f.addEventListener('change',(ev)=>{const files=ev.target.files;if(files.length>0){handleFile(files[0])}f.value=''});let dragCount=0;d.addEventListener('dragenter',(ev)=>{ev.preventDefault();dragCount++;d.classList.add('drag')});d.addEventListener('dragleave',(ev)=>{ev.preventDefault();dragCount--;if(dragCount===0)d.classList.remove('drag')});d.addEventListener('dragover',(ev)=>ev.preventDefault());d.addEventListener('drop',(ev)=>{ev.preventDefault();dragCount=0;d.classList.remove('drag');const files=ev.dataTransfer.files;if(files.length>0)handleFile(files[0])});document.addEventListener('visibilitychange',()=>{if(document.hidden){s.textContent='Upload paused - don\'t switch tabs'}})})()</script></body></html>
