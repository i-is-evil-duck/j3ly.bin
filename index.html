<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Share</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;max-width:600px;margin:50px auto;padding:20px;background:#0f0f0f;color:#fff}#d{border:3px dashed #333;padding:60px;text-align:center;border-radius:12px;cursor:pointer;transition:.2s}#d:hover,#d.drag{border-style:solid;background:#334}#f{display:none}select{background:#333;color:#fff;border:1px solid #444;padding:8px 12px;border-radius:6px;margin-bottom:15px;font-size:14px}.i{display:flex;justify-content:space-between;align-items:center;padding:12px;margin:8px 0;background:#1a1a1a;border-radius:8px;gap:10px}.n{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888}a{text-decoration:none;word-break:break-all;color:#fff}a:hover{text-decoration:underline}button{background:#333;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer}button:hover{background:#444}#p{height:2px;width:0;transition:.3s;position:fixed;top:0;left:0}#e{color:#f44;font-size:12px;margin-top:10px}</style></head><body><div id="p"></div><h1>TempShare</h1><p style="color:#666;margin:10px 0">Drop file -> get link -> auto-deletes</p><select id="t"><option value="5m">5m</option><option value="15m">15m</option><option value="30m" selected>30m</option><option value="6h">6h</option><option value="48h">48h</option><option value="2w">2w</option><option value="1M">1m</option><option value="3M">3m</option></select><div id="d"><p>Drop file or click</p><p id="e"></p><input type="file" id="f"></div><div id="l"></div><script>const $=id=>document.getElementById(id),d=$('d'),f=$('f'),l=$('l'),p=$('p'),t=$('t'),e=$('e');d.onclick=()=>f.click();d.ondragover=x=>{x.preventDefault();d.classList.add('drag')};d.ondragleave=()=>d.classList.remove('drag');d.ondrop=x=>{x.preventDefault();d.classList.remove('drag');h(x.dataTransfer.files[0])};f.onchange=x=>h(x.target.files[0]);async function h(f){if(!f)return;e.textContent='';const m=t.value,i=crypto.randomUUID().slice(0,8),c=1024*1024,n=Math.max(1,Math.ceil(f.size/c));for(let k=0;k<n;k++){const s=k*c,en=Math.min(s+c,f.size),u=new Uint8Array(await f.slice(s,en).arrayBuffer());try{await new Promise((R,j)=>{const x=new XMLHttpRequest();x.upload.onprogress=v=>{const d=(k*c+v.loaded)/f.size*100;p.style.width=d+'%'};x.onload=()=>{if(x.status==200){const r=JSON.parse(x.responseText);if(r.url||r.ok)R(r);else j(x.responseText)}else j(x.responseText)};x.onerror=()=>j('Network error');x.open('POST','/chunk');x.setRequestHeader('Content-Type','application/octet-stream');x.setRequestHeader('X-Filename',f.name);x.setRequestHeader('X-Ttl',m);x.setRequestHeader('X-Upload-Id',i);x.setRequestHeader('X-Chunk-Index',k.toString());x.setRequestHeader('X-Total-Chunks',n.toString());x.setRequestHeader('X-Total-Size',f.size.toString());x.send(u)})}catch(err){e.textContent='Error: '+err;p.style.width='0';return}}p.style.width='0';const r={id:i,url:'/s/'+i,name:f.name},div=document.createElement('div');div.className='i';div.innerHTML=`<a href="${r.url}" target="_blank">${location.origin}${r.url}</a><span class="n">${r.name}</span><button onclick="navigator.clipboard.writeText('${location.origin}${r.url}')">Copy</button>`;l.prepend(div)}</script></body></html>
